<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pushup Logg</title>
<style>
body{font-family:Arial,sans-serif;max-width:760px;margin:auto;padding:18px;background:#0f172a;color:white}
h1{text-align:center;margin-bottom:5px}
.sub{text-align:center;color:#94a3b8}
.card{background:#1e293b;padding:16px;border-radius:14px;margin-top:14px}
input,button{padding:12px;font-size:18px;border-radius:10px;border:0;margin:4px}
input{width:160px}
button{background:#2563eb;color:white;font-weight:bold}
.quick button{background:#334155}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:#0f172a;padding:12px;border-radius:12px;text-align:center}
.big{font-size:30px;font-weight:bold}
.label{color:#94a3b8}
.progress{height:18px;background:#334155;border-radius:20px;overflow:hidden}
.fill{height:100%;background:#22c55e;width:0%}
.chart{display:flex;align-items:end;gap:8px;height:180px;border-bottom:1px solid #475569;padding-top:20px;overflow-x:auto}
.barWrap{text-align:center;min-width:36px}
.bar{background:#38bdf8;border-radius:8px 8px 0 0;min-height:3px}
.date{font-size:11px;color:#94a3b8;margin-top:5px}
.value{font-size:12px}
.danger{background:#dc2626}
</style>
</head>
<body>

<h1>💪 Pushup Logg</h1>
<div class="sub">v2 · lagring · streak · mål · søylediagram</div>

<div class="card">
<h3>Logg dagens pushups</h3>
<input id="pushups" type="number" placeholder="Antall">
<button onclick="savePushups()">Lagre</button>
<div class="quick">
<button onclick="quickAdd(10)">+10</button>
<button onclick="quickAdd(20)">+20</button>
<button onclick="quickAdd(25)">+25</button>
<button onclick="quickAdd(50)">+50</button>
</div>
</div>

<div class="card">
<h3>Dagens mål: <span id="goalText">100</span> pushups</h3>
<div class="progress"><div id="goalFill" class="fill"></div></div>
<p><span id="goalStatus">0 / 100</span></p>
</div>

<div class="card stats">
<div class="stat"><div id="today" class="big">0</div><div class="label">I dag</div></div>
<div class="stat"><div id="streak" class="big">0</div><div class="label">Dager på rad</div></div>
<div class="stat"><div id="bestStreak" class="big">0</div><div class="label">Lengste streak</div></div>
<div class="stat"><div id="total" class="big">0</div><div class="label">Totalt</div></div>
<div class="stat"><div id="best" class="big">0</div><div class="label">Beste dag</div></div>
</div>

<div class="card">
<h3>Søylediagram siste 14 dager</h3>
<div id="chart" class="chart"></div>
</div>
<div class="card">
<h3>Dagens økter</h3>
<div id="sessions"></div>
</div>

<div class="card">
<button onclick="exportData()">Eksporter data</button>
<button class="danger" onclick="resetData()">Nullstill</button>
<p class="sub">Data lagres kun på denne enheten i nettleseren.</p>
</div>

<script>
const GOAL = 100;

function getToday(){
  return new Date().toISOString().split("T")[0];
}

function loadData(){
  try{
    return JSON.parse(localStorage.getItem("pushupData") || "{}");
  }catch(e){
    return {};
  }
}

function saveData(data){
  localStorage.setItem("pushupData", JSON.stringify(data));
}
function loadSessions(){
  return JSON.parse(localStorage.getItem("pushupSessions") || "[]");
}

function saveSessions(sessions){
  localStorage.setItem("pushupSessions", JSON.stringify(sessions));
}
  
function savePushups(){
  const amount = parseInt(document.getElementById("pushups").value,10);
  if(!amount || amount < 1){
    alert("Skriv inn antall pushups");
    return;
  }
  addPushups(amount);
  document.getElementById("pushups").value = "";
}

function quickAdd(amount){
  addPushups(amount);
}

function addPushups(amount){
  const data = loadData();
  const today = getToday();

  data[today] = (data[today] || 0) + amount;
  saveData(data);

  const sessions = loadSessions();
  const now = new Date();

  sessions.push({
    date: today,
    time: now.toLocaleTimeString("no-NO", {hour:"2-digit", minute:"2-digit"}),
    amount: amount
  });

  saveSessions(sessions);

alert("Lagret " + amount + " pushups");

render();
}

function calcStreak(data){
  let streak = 0;
  let d = new Date();

  while(true){
    const key = d.toISOString().split("T")[0];

    if(data[key] && data[key] > 0){
      streak++;
      d.setDate(d.getDate() - 1);
    }else{
      break;
    }
  }

  return streak;
}

function calcBestStreak(data){
  const dates = Object.keys(data)
    .filter(d => data[d] > 0)
    .sort();

  if(dates.length === 0) return 0;

  let best = 1;
  let current = 1;

  for(let i = 1; i < dates.length; i++){
    const prev = new Date(dates[i-1]);
    const curr = new Date(dates[i]);
    const diff = (curr - prev) / (1000*60*60*24);

    if(diff === 1){
      current++;
      if(current > best) best = current;
    }else{
      current = 1;
    }
  }

  return best;
}

function lastDays(days){
  const arr = [];
  const d = new Date();

  for(let i = days - 1; i >= 0; i--){
    const x = new Date(d);
    x.setDate(d.getDate() - i);
    arr.push(x.toISOString().split("T")[0]);
  }
  return arr;
}

function render(){
  const data = loadData();
  const todayKey = getToday();
  const today = data[todayKey] || 0;

  let total = 0;
  let best = 0;

  Object.values(data).forEach(v=>{
    total += v;
    if(v > best) best = v;
  });

  document.getElementById("today").innerText = today;
  document.getElementById("total").innerText = total;
  document.getElementById("best").innerText = best;
  document.getElementById("streak").innerText = calcStreak(data);
  document.getElementById("bestStreak").innerText = calcBestStreak(data);

  document.getElementById("goalText").innerText = GOAL;
  document.getElementById("goalStatus").innerText = today + " / " + GOAL;
  document.getElementById("goalFill").style.width = Math.min(100, today / GOAL * 100) + "%";

  const chart = document.getElementById("chart");
  chart.innerHTML = "";

  const days = lastDays(14);
  const max = Math.max(1, ...days.map(d=>data[d] || 0));

  days.forEach(date=>{
    const value = data[date] || 0;
    const height = Math.max(3, (value / max) * 150);

    const wrap = document.createElement("div");
    wrap.className = "barWrap";

    const val = document.createElement("div");
    val.className = "value";
    val.innerText = value;

    const bar = document.createElement("div");
    bar.className = "bar";
    bar.style.height = height + "px";

    const label = document.createElement("div");
    label.className = "date";
    label.innerText = date.slice(5);

    wrap.appendChild(val);
    wrap.appendChild(bar);
    wrap.appendChild(label);
    chart.appendChild(wrap);
  });
const sessionsBox = document.getElementById("sessions");

if(sessionsBox){
  sessionsBox.innerHTML = "";

  const sessions = loadSessions()
    .filter(s => s.date === todayKey)
    .reverse();

  if(sessions.length === 0){
    sessionsBox.innerHTML = "<p class='sub'>Ingen økter logget i dag.</p>";
  }else{
    sessions.forEach(s=>{
      const div = document.createElement("div");
      div.style.padding = "8px";
      div.style.borderBottom = "1px solid #334155";
      div.innerText = s.time + "  +" + s.amount + " pushups";
      sessionsBox.appendChild(div);
    });
  }

function exportData(){
  const data = loadData();
  const text = JSON.stringify(data, null, 2);
  prompt("Kopier backup-data:", text);
}

function resetData(){
  if(confirm("Er du sikker på at du vil slette all pushup-data?")){
    localStorage.removeItem("pushupData");
    render();
  }
}

render();
</script>

</body>
</html>
